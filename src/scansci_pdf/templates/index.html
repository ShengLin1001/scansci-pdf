<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanSci PDF — Academic Paper Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()" x-cloak>

<!-- Header -->
<header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-900">ScanSci PDF</h1>
                <p class="text-xs text-gray-500">Academic Paper Downloader</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs px-2 py-1 rounded-full"
                  :class="status === 'ok' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                  x-text="status === 'ok' ? 'Online' : 'Checking...'"></span>
            <!-- Source status badges -->
            <template x-if="sources.cloakbrowser !== undefined">
                <div class="flex items-center gap-1 ml-2">
                    <span class="text-xs px-1.5 py-0.5 rounded"
                          :class="sources.cloakbrowser ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'"
                          x-text="'Browser: ' + (sources.cloakbrowser ? 'OK' : 'Off')"></span>
                    <span class="text-xs px-1.5 py-0.5 rounded"
                          :class="sources.tor ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                          x-text="'Tor: ' + (sources.tor ? 'OK' : 'Off')"></span>
                    <span x-show="sources.webvpn" class="text-xs px-1.5 py-0.5 rounded bg-blue-100 text-blue-700">WebVPN</span>
                    <span x-show="sources.carsi" class="text-xs px-1.5 py-0.5 rounded bg-blue-100 text-blue-700">CARSI</span>
                </div>
            </template>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8">

    <!-- Search Box -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <form @submit.prevent="doAction()" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Enter DOI, title, arXiv ID, or search keywords
                </label>
                <div class="relative">
                    <input type="text"
                           x-model="query"
                           @input="onInput()"
                           @keydown.enter.prevent="doAction()"
                           placeholder="e.g. 10.1038/nature12373, or paper title..."
                           class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg text-base
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none
                                  placeholder:text-gray-400 transition">
                    <button type="submit"
                            :disabled="loading || !query.trim()"
                            class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg
                                   bg-blue-600 text-white hover:bg-blue-700 disabled:bg-gray-300
                                   disabled:cursor-not-allowed transition">
                        <svg x-show="!loading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <div x-show="loading" class="spinner" style="width:20px;height:20px;border-width:2px;"></div>
                    </button>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="flex items-center gap-3">
                <button type="button"
                        @click="mode = 'search'; doAction()"
                        :disabled="loading || !query.trim()"
                        class="px-4 py-2 text-sm rounded-lg border transition"
                        :class="mode === 'search' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'">
                    Search Papers
                </button>
                <button type="button"
                        @click="mode = 'download'; doAction()"
                        :disabled="loading || !query.trim()"
                        class="px-4 py-2 text-sm rounded-lg border transition"
                        :class="mode === 'download' ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'">
                    Direct Download
                </button>
            </div>
        </form>
    </div>

    <!-- Error -->
    <div x-show="error" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6 fade-in">
        <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div class="flex-1">
                <p class="text-sm text-red-800 font-medium" x-text="error"></p>
                <p x-show="errorHint" class="text-xs text-red-600 mt-1" x-text="errorHint"></p>
                <ul x-show="errorGuidance.length > 0" class="mt-2 space-y-1">
                    <template x-for="(g, i) in errorGuidance" :key="i">
                        <li class="text-xs text-red-600 flex items-start gap-1.5">
                            <span class="text-red-400 mt-0.5">&#8226;</span>
                            <span x-text="g"></span>
                        </li>
                    </template>
                </ul>
            </div>
        </div>
    </div>

    <!-- Download Progress -->
    <div x-show="downloading" class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6 fade-in">
        <div class="flex items-center gap-3">
            <div class="spinner"></div>
            <div class="flex-1">
                <p class="text-sm text-blue-800 font-medium">Downloading PDF...</p>
                <p class="text-xs text-blue-600" x-text="downloadMsg"></p>
                <p class="text-xs text-blue-400 mt-1" x-show="downloadElapsed > 0"
                   x-text="'Elapsed: ' + downloadElapsed + 's — racing 13+ sources in parallel'"></p>
            </div>
        </div>
    </div>

    <!-- Search Results -->
    <div x-show="results.length > 0" class="space-y-3 mb-6">
        <div class="flex items-center justify-between">
            <h2 class="text-sm font-semibold text-gray-700">
                <span x-text="results.length"></span> results found
            </h2>
        </div>

        <template x-for="(paper, idx) in results" :key="idx">
            <div class="bg-white rounded-lg border border-gray-200 p-4 hover:border-blue-300 hover:shadow-sm transition fade-in"
                 :style="'animation-delay:' + (idx * 50) + 'ms'">
                <div class="flex items-start justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <h3 class="text-sm font-semibold text-gray-900 leading-snug"
                            x-text="paper.title || paper.doi || 'Unknown'"></h3>
                        <p class="text-xs text-gray-500 mt-1"
                           x-show="paper.authors && paper.authors.length > 0"
                           x-text="(paper.authors || []).slice(0, 3).join(', ') + (paper.authors && paper.authors.length > 3 ? ' et al.' : '')"></p>
                        <div class="flex items-center gap-3 mt-2 flex-wrap">
                            <span x-show="paper.year" class="text-xs text-gray-400" x-text="paper.year"></span>
                            <span x-show="paper.doi" class="text-xs font-mono text-blue-600 truncate max-w-xs" x-text="paper.doi"></span>
                            <span x-show="paper.is_oa" class="text-xs px-1.5 py-0.5 bg-green-100 text-green-700 rounded">Open Access</span>
                            <span x-show="paper.cited_by_count > 0" class="text-xs text-gray-400"
                                  x-text="'Cited: ' + paper.cited_by_count"></span>
                        </div>
                        <p x-show="paper.abstract" class="text-xs text-gray-500 mt-2 line-clamp-2"
                           x-text="(paper.abstract || '').substring(0, 200)"></p>
                    </div>
                    <button @click="downloadPaper(paper.doi || paper.identifier)"
                            :disabled="downloading"
                            class="flex-shrink-0 px-3 py-2 text-sm rounded-lg bg-emerald-600 text-white
                                   hover:bg-emerald-700 disabled:bg-gray-300 disabled:cursor-not-allowed
                                   transition flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        PDF
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- Download History -->
    <div x-show="history.length > 0" class="mt-8">
        <h2 class="text-sm font-semibold text-gray-500 mb-3">Recent Downloads</h2>
        <div class="space-y-2">
            <template x-for="(item, idx) in history" :key="idx">
                <div class="flex items-center gap-3 text-sm bg-white rounded-lg border border-gray-100 px-4 py-2.5">
                    <svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <span class="text-gray-900 truncate flex-1" x-text="item.title || item.identifier"></span>
                    <span class="text-xs text-gray-400 flex-shrink-0" x-text="item.source"></span>
                </div>
            </template>
        </div>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && !downloading && results.length === 0 && !error && !history.length"
         class="text-center py-16 text-gray-400">
        <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <p class="text-lg font-medium">Enter a DOI, title, or keywords to start</p>
        <p class="text-sm mt-1">Supports 13+ sources including Open Access, Sci-Hub, and institutional proxies</p>
    </div>
</main>

<!-- Footer -->
<footer class="max-w-4xl mx-auto px-4 py-6 text-center text-xs text-gray-400 border-t border-gray-100 mt-8">
    ScanSci PDF &mdash; 13+ sources, parallel racing, institutional proxy support
</footer>

<script>
function app() {
    return {
        query: '',
        mode: 'search',
        results: [],
        history: [],
        loading: false,
        downloading: false,
        downloadMsg: '',
        downloadElapsed: 0,
        error: '',
        errorHint: '',
        errorGuidance: [],
        status: 'checking',
        sources: {},

        async init() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                this.status = d.status;
                this.sources = d.sources || {};
            } catch { this.status = 'offline'; }
        },

        onInput() {
            this.error = '';
            this.errorHint = '';
            this.errorGuidance = [];
            // Auto-detect mode
            const q = this.query.trim();
            if (/^10\.\d{4,}\//.test(q) || /^https?:\/\/doi\.org\//.test(q) || /^\d{4}\.\d{4,}/.test(q)) {
                this.mode = 'download';
            }
        },

        doAction() {
            if (!this.query.trim()) return;
            if (this.mode === 'download') {
                this.downloadPaper(this.query.trim());
            } else {
                this.searchPapers();
            }
        },

        async searchPapers() {
            this.loading = true;
            this.error = '';
            this.errorHint = '';
            this.errorGuidance = [];
            this.results = [];

            try {
                const resp = await fetch('/api/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: this.query.trim(), limit: 10}),
                });
                if (!resp.ok) {
                    const d = await resp.json();
                    this.error = d.error || 'Search failed';
                    return;
                }
                this.results = await resp.json();
                if (this.results.length === 0) {
                    this.error = 'No results found. Try different keywords.';
                }
            } catch (e) {
                this.error = 'Network error: ' + e.message;
            } finally {
                this.loading = false;
            }
        },

        async downloadPaper(identifier) {
            if (!identifier) return;
            this.downloading = true;
            this.downloadMsg = identifier;
            this.downloadElapsed = 0;
            this.error = '';
            this.errorHint = '';
            this.errorGuidance = [];

            // Elapsed timer
            const timer = setInterval(() => { this.downloadElapsed++; }, 1000);

            try {
                const resp = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({identifier}),
                });

                if (resp.ok && resp.headers.get('content-type')?.includes('application/pdf')) {
                    // Trigger browser download
                    const blob = await resp.blob();
                    const cd = resp.headers.get('content-disposition') || '';
                    let filename = 'paper.pdf';
                    const m = cd.match(/filename[*]?=(?:UTF-8''|"?)([^";]+)/i);
                    if (m) filename = decodeURIComponent(m[1].replace(/"/g, ''));
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = filename;
                    document.body.appendChild(a); a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    const realSource = resp.headers.get('x-scansci-source') || 'unknown';
                    this.history.unshift({title: filename.replace('.pdf',''), identifier, source: realSource});
                    if (this.history.length > 20) this.history.pop();
                } else {
                    const d = await resp.json();
                    this.error = d.error || d.reason || 'Download failed';
                    this.errorHint = d.hint?.message || '';
                    this.errorGuidance = d.guidance || [];
                    // Update source status if returned
                    if (d.sources) this.sources = d.sources;
                }
            } catch (e) {
                this.error = 'Network error: ' + e.message;
            } finally {
                clearInterval(timer);
                this.downloading = false;
                this.downloadMsg = '';
                this.downloadElapsed = 0;
            }
        }
    };
}
</script>

</body>
</html>
