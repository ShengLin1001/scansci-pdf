services:
  scansci-pdf:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TOR_PROXY=socks5h://tor:1080
      - SCANSCI_PDF_DATA_DIR=/data/paper-fetch
      - NO_PROXY=localhost,127.0.0.1,tor
    volumes:
      - scansci-pdf-data:/data/paper-fetch
    depends_on:
      - tor
    networks:
      - scansci-pdf-net
    restart: unless-stopped

  tor:
    image: shahradel/torproxy:latest
    ports:
      - "1080:1080"
    networks:
      - scansci-pdf-net
    restart: unless-stopped

networks:
  scansci-pdf-net:
    driver: bridge

volumes:
  scansci-pdf-data:
